<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inspección de Plantillas</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
        }
        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .card {
            border: 2px solid #555;
            padding: 10px;
            border-radius: 8px;
            background: #222;
        }
        img {
            max-width: 500px;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <h1>Inspección de Plantillas de Carnet</h1>
    <div class="container">
        <div class="card">
            <h3>Frontal (FrontCarnet.png)</h3>
            <img src="FrontCarnet.png" alt="Frontal">
        </div>
        <div class="card">
            <h3>Trasero (BackCarnet.png)</h3>
            <img src="BackCarnet.png" alt="Trasero">
        </div>
    </div>
</body>
</html>
